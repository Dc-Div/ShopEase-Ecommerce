<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase – Category</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .cat-hero { background:var(--navy); color:#fff; padding:4rem 0 3rem; text-align:center; }
    .cat-hero h1 { font-size:2.5rem; font-weight:900; }
    .sidebar-card { background:#fff; border-radius:var(--radius); padding:1.5rem; border:1px solid var(--border); margin-bottom:1.2rem; }
    .sidebar-card h6 { font-weight:700; font-size:.8rem; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
    .sidebar-link { display:block; padding:6px 0; font-size:.88rem; font-weight:500; color:var(--navy); cursor:pointer; border-bottom:1px solid var(--border); transition:.15s; }
    .sidebar-link:last-child { border-bottom:none; }
    .sidebar-link:hover, .sidebar-link.active { color:var(--gold); }
    .range-slider { -webkit-appearance:none; width:100%; height:4px; border-radius:2px; background:linear-gradient(to right,var(--gold) 60%,var(--border) 60%); outline:none; }
    .range-slider::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--gold); cursor:pointer; }
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="cat-hero">
  <h1>Browse Categories</h1>
  <p>Find exactly what you're looking for</p>
</div>

<div class="container py-5">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-lg-3 mb-4">
      <div class="sidebar-card">
        <h6>Categories</h6>
        <a class="sidebar-link active" onclick="catFilter('all',this)">All Products</a>
        <a class="sidebar-link" onclick="catFilter('Clothing',this)">👕 Clothing</a>
        <a class="sidebar-link" onclick="catFilter('Footwear',this)">👟 Footwear</a>
        <a class="sidebar-link" onclick="catFilter('Electronics',this)">⌚ Electronics</a>
        <a class="sidebar-link" onclick="catFilter('Accessories',this)">💍 Accessories</a>
      </div>
      <div class="sidebar-card">
        <h6>Price Range</h6>
        <input type="range" class="range-slider" min="100" max="3000" value="3000" id="price-range"
          oninput="document.getElementById('range-val').textContent='₹'+this.value"/>
        <div class="d-flex justify-content-between mt-2" style="font-size:.82rem;font-weight:600;">
          <span>₹100</span><span id="range-val">₹3000</span>
        </div>
      </div>
      <div class="sidebar-card">
        <h6>Rating</h6>
        <div style="font-size:.85rem;">
          <label style="cursor:pointer;display:block;padding:4px 0;"><input type="checkbox" style="margin-right:6px;"/>4★ & above</label>
          <label style="cursor:pointer;display:block;padding:4px 0;"><input type="checkbox" style="margin-right:6px;"/>3★ & above</label>
          <label style="cursor:pointer;display:block;padding:4px 0;"><input type="checkbox" style="margin-right:6px;"/>All Ratings</label>
        </div>
      </div>
    </div>
    <!-- Products -->
    <div class="col-lg-9">
      <div class="row" id="cat-products"></div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script>
  injectNavbar('category');
  injectFooter();
  let filtered = [...products];

  function catFilter(cat, el) {
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    if(el) el.classList.add('active');
    filtered = cat === 'all' ? [...products] : products.filter(p => p.category === cat);
    document.getElementById('cat-products').innerHTML = filtered.map(productCardHTML).join('');
  }
  catFilter('all');

  // Check URL param
  const cat = new URLSearchParams(window.location.search).get('cat');
  if(cat) { const el = document.querySelector(`.sidebar-link[onclick*="${cat}"]`); catFilter(cat, el); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase – Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .checkout-step { display:flex; align-items:center; gap:.5rem; font-size:.82rem; font-weight:700; }
    .step-num { width:28px; height:28px; border-radius:50%; background:var(--border); color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:.78rem; font-weight:700; }
    .step-num.active { background:var(--navy); color:#fff; }
    .step-num.done { background:var(--gold); color:var(--navy); }
    .checkout-line { flex:1; height:2px; background:var(--border); margin:0 4px; }
    .payment-card { border:2px solid var(--border); border-radius:var(--radius); padding:1rem 1.2rem; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:1rem; margin-bottom:.8rem; }
    .payment-card.selected, .payment-card:hover { border-color:var(--gold); }
    .payment-card .picon { font-size:1.5rem; color:var(--gold); }
    .order-mini { background:var(--cream); border-radius:var(--radius); padding:1.5rem; border:1px solid var(--border); }
    .order-mini-item { display:flex; align-items:center; gap:.8rem; padding:.5rem 0; border-bottom:1px solid var(--border); font-size:.88rem; }
    .order-mini-item:last-child { border-bottom:none; }
    .order-mini-item img { width:48px; height:48px; border-radius:8px; object-fit:cover; }
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-hero">
  <h1>Checkout</h1>
  <div class="breadcrumb-custom">
    <a href="index.html">Home</a><span class="sep">/</span>
    <a href="cart.html">Cart</a><span class="sep">/</span>Checkout
  </div>
</div>

<div class="container py-5">
  <!-- Steps -->
  <div class="d-flex align-items-center mb-5" style="max-width:500px;margin:0 auto 2.5rem;">
    <div class="checkout-step"><div class="step-num active">1</div><span style="font-size:.82rem;">Delivery</span></div>
    <div class="checkout-line"></div>
    <div class="checkout-step"><div class="step-num" id="step2">2</div><span style="font-size:.82rem;">Payment</span></div>
    <div class="checkout-line"></div>
    <div class="checkout-step"><div class="step-num" id="step3">3</div><span style="font-size:.82rem;">Confirm</span></div>
  </div>

  <div class="row">
    <div class="col-lg-7 mb-4">
      <!-- Address -->
      <div class="contact-card mb-4">
        <h5 style="font-weight:900;margin-bottom:1.5rem;font-family:'Playfair Display',serif;">Delivery Address</h5>
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label">First Name</label><input type="text" class="form-control" placeholder="Rahul"/></div>
          <div class="col-md-6 mb-3"><label class="form-label">Last Name</label><input type="text" class="form-control" placeholder="Sharma"/></div>
          <div class="col-12 mb-3"><label class="form-label">Email</label><input type="email" class="form-control" placeholder="rahul@example.com"/></div>
          <div class="col-12 mb-3"><label class="form-label">Phone</label><input type="tel" class="form-control" placeholder="+91 98765 43210"/></div>
          <div class="col-12 mb-3"><label class="form-label">Address</label><input type="text" class="form-control" placeholder="Street, Building No."/></div>
          <div class="col-md-4 mb-3"><label class="form-label">City</label><input type="text" class="form-control" placeholder="Mumbai"/></div>
          <div class="col-md-4 mb-3"><label class="form-label">State</label><input type="text" class="form-control" placeholder="Maharashtra"/></div>
          <div class="col-md-4 mb-3"><label class="form-label">PIN Code</label><input type="text" class="form-control" placeholder="400001"/></div>
        </div>
      </div>
      <!-- Payment -->
      <div class="contact-card">
        <h5 style="font-weight:900;margin-bottom:1.5rem;font-family:'Playfair Display',serif;">Payment Method</h5>
        <div class="payment-card selected" onclick="selectPayment(this)">
          <div class="picon"><i class="fas fa-credit-card"></i></div>
          <div><div style="font-weight:700;font-size:.9rem;">Credit / Debit Card</div><div style="font-size:.78rem;color:var(--muted);">Visa, Mastercard, Rupay</div></div>
        </div>
        <div class="payment-card" onclick="selectPayment(this)">
          <div class="picon"><i class="fas fa-mobile-alt"></i></div>
          <div><div style="font-weight:700;font-size:.9rem;">UPI</div><div style="font-size:.78rem;color:var(--muted);">PhonePe, GPay, Paytm</div></div>
        </div>
        <div class="payment-card" onclick="selectPayment(this)">
          <div class="picon"><i class="fas fa-money-bill-wave"></i></div>
          <div><div style="font-weight:700;font-size:.9rem;">Cash on Delivery</div><div style="font-size:.78rem;color:var(--muted);">Pay when delivered</div></div>
        </div>
        <div class="mt-3">
          <div class="mb-2"><label class="form-label">Card Number</label><input type="text" class="form-control" placeholder="1234 5678 9012 3456"/></div>
          <div class="row">
            <div class="col-6 mb-2"><label class="form-label">Expiry</label><input type="text" class="form-control" placeholder="MM/YY"/></div>
            <div class="col-6 mb-2"><label class="form-label">CVV</label><input type="text" class="form-control" placeholder="•••"/></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Order Summary -->
    <div class="col-lg-5">
      <div class="order-mini mb-4">
        <h6 style="font-weight:900;margin-bottom:1rem;font-family:'Playfair Display',serif;">Your Order</h6>
        <div id="checkout-items"></div>
        <hr/>
        <div class="d-flex justify-content-between" style="font-size:.88rem;"><span>Subtotal</span><span id="co-sub">₹0</span></div>
        <div class="d-flex justify-content-between mt-1" style="font-size:.88rem;"><span>Delivery</span><span>₹49</span></div>
        <div class="d-flex justify-content-between mt-2 font-weight-bold"><span>Total</span><span id="co-total">₹49</span></div>
      </div>
      <button class="btn-gold btn w-100" onclick="placeOrder()"><i class="fas fa-check-circle mr-2"></i>Place Order</button>
      <div class="mt-2 text-center" style="font-size:.78rem;color:var(--muted);"><i class="fas fa-lock mr-1" style="color:var(--gold);"></i>Your info is safe with us</div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script>
  injectNavbar('');
  injectFooter();

  function renderCheckout() {
    const cart = getCart();
    const sub = cart.reduce((a,b) => a + b.price * b.qty, 0);
    document.getElementById('co-sub').textContent = '₹' + sub;
    document.getElementById('co-total').textContent = '₹' + (sub + 49);
    document.getElementById('checkout-items').innerHTML = cart.length
      ? cart.map(item => `
        <div class="order-mini-item">
          <img src="${item.img}" alt=""/>
          <div style="flex:1"><div style="font-weight:700;font-size:.85rem;">${item.name}</div>
          <div style="font-size:.75rem;color:var(--muted);">Qty: ${item.qty} | Size: ${item.size}</div></div>
          <span style="font-weight:700;">₹${item.price * item.qty}</span>
        </div>`).join('')
      : '<p style="color:var(--muted);font-size:.88rem;">No items in cart.</p>';
  }

  function selectPayment(el) {
    document.querySelectorAll('.payment-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  }

  function placeOrder() {
    const cart = getCart();
    if (!cart.length) { toast('<i class="fas fa-exclamation-circle mr-1" style="color:#f56565;"></i> Cart is empty!'); return; }
    const orderId = 'SE-' + Math.floor(10000 + Math.random() * 90000);
    localStorage.setItem('shopease_last_order', JSON.stringify({ orderId, cart, total: cart.reduce((a,b) => a + b.price * b.qty, 0) + 49 }));
    saveCart([]);
    window.location.href = 'order-confirmation.html';
  }

  renderCheckout();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase – Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .filter-bar { background: #fff; border-radius: var(--radius); padding: 1.2rem 1.5rem; box-shadow: var(--shadow2); border: 1px solid var(--border); margin-bottom: 2rem; display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; }
    .filter-btn { background: var(--light); border: 1px solid var(--border); border-radius: 50px; padding: 5px 18px; font-size: .83rem; font-weight: 600; cursor: pointer; transition: .2s; color: var(--navy); }
    .filter-btn.active, .filter-btn:hover { background: var(--gold); border-color: var(--gold); color: var(--navy); }
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-hero">
  <h1>All Products</h1>
  <p>Browse our complete collection</p>
  <div class="breadcrumb-custom"><a href="index.html">Home</a><span class="sep">/</span>Products</div>
</div>

<div class="container py-5">
  <div class="filter-bar">
    <span style="font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Filter:</span>
    <button class="filter-btn active" onclick="filterProducts('all',this)">All</button>
    <button class="filter-btn" onclick="filterProducts('Clothing',this)">👕 Clothing</button>
    <button class="filter-btn" onclick="filterProducts('Footwear',this)">👟 Footwear</button>
    <button class="filter-btn" onclick="filterProducts('Electronics',this)">⌚ Electronics</button>
    <button class="filter-btn" onclick="filterProducts('Accessories',this)">💍 Accessories</button>
    <div class="ml-auto d-flex align-items-center" style="gap:.5rem;">
      <span style="font-size:.82rem;color:var(--muted);">Sort:</span>
      <select class="form-control form-control-sm" style="width:140px;border-radius:8px;" onchange="sortProducts(this.value)">
        <option value="default">Default</option>
        <option value="price-low">Price: Low–High</option>
        <option value="price-high">Price: High–Low</option>
        <option value="rating">Top Rated</option>
      </select>
    </div>
  </div>
  <div class="row" id="all-products"></div>
</div>

<div id="footer-placeholder"></div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script>
  injectNavbar('products');
  injectFooter();
  let filtered = [...products];

  function render() {
    document.getElementById('all-products').innerHTML = filtered.map(productCardHTML).join('');
  }
  function filterProducts(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtered = cat === 'all' ? [...products] : products.filter(p => p.category === cat);
    render();
  }
  function sortProducts(val) {
    if (val === 'price-low')  filtered.sort((a,b) => a.price - b.price);
    else if (val === 'price-high') filtered.sort((a,b) => b.price - a.price);
    else if (val === 'rating')     filtered.sort((a,b) => b.rating - a.rating);
    else filtered = [...products];
    render();
  }
  render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase – Order Confirmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .confirm-hero { background:linear-gradient(135deg,var(--navy),#1a3048); color:#fff; padding:5rem 0; text-align:center; }
    .confirm-check { width:90px; height:90px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:var(--navy); margin:0 auto 1.5rem; animation:popIn .4s ease; }
    @keyframes popIn { 0%{transform:scale(0);} 80%{transform:scale(1.1);} 100%{transform:scale(1);} }
    .order-timeline { position:relative; padding-left:2rem; }
    .order-timeline::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background:var(--border); }
    .timeline-item { position:relative; margin-bottom:1.5rem; }
    .timeline-item .dot { position:absolute; left:-2rem; top:4px; width:16px; height:16px; border-radius:50%; background:var(--gold); border:3px solid #fff; box-shadow:0 0 0 2px var(--gold); }
    .timeline-item .dot.empty { background:#fff; box-shadow:0 0 0 2px var(--border); }
    .timeline-item h6 { font-weight:700; font-size:.9rem; margin-bottom:.2rem; }
    .timeline-item p { font-size:.82rem; color:var(--muted); margin:0; }
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="confirm-hero">
  <div class="container">
    <div class="confirm-check"><i class="fas fa-check"></i></div>
    <h1 style="font-size:2.5rem;font-weight:900;">Order Confirmed!</h1>
    <p style="color:#8899aa;margin-top:.5rem;">Thank you for your purchase. We've received your order.</p>
    <div style="background:rgba(255,255,255,.07);border-radius:12px;display:inline-block;padding:.8rem 2rem;margin-top:1.2rem;">
      <span style="font-size:.82rem;color:#8899aa;">Order ID</span>
      <div style="font-size:1.3rem;font-weight:900;color:var(--gold);" id="confirm-order-id">#SE-00000</div>
    </div>
  </div>
</div>

<div class="container py-5">
  <div class="row">
    <div class="col-lg-7 mb-4">
      <div class="contact-card">
        <h5 style="font-weight:900;margin-bottom:1.5rem;font-family:'Playfair Display',serif;">Order Details</h5>
        <div id="confirm-items"></div>
      </div>
    </div>
    <div class="col-lg-5">
      <div class="contact-card mb-4">
        <h6 style="font-weight:900;font-family:'Playfair Display',serif;margin-bottom:1rem;">Delivery Timeline</h6>
        <div class="order-timeline">
          <div class="timeline-item"><div class="dot"></div><h6>Order Placed</h6><p>Just now</p></div>
          <div class="timeline-item"><div class="dot empty"></div><h6>Processing</h6><p>Within 24 hours</p></div>
          <div class="timeline-item"><div class="dot empty"></div><h6>Shipped</h6><p>1–2 business days</p></div>
          <div class="timeline-item"><div class="dot empty"></div><h6>Delivered</h6><p>3–5 business days</p></div>
        </div>
      </div>
      <div class="d-flex flex-column" style="gap:.8rem;">
        <a href="products.html" class="btn-gold btn"><i class="fas fa-shopping-bag mr-2"></i>Continue Shopping</a>
        <a href="index.html" class="btn-navy btn"><i class="fas fa-home mr-2"></i>Back to Home</a>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script>
  injectNavbar('');
  injectFooter();
  try {
    const order = JSON.parse(localStorage.getItem('shopease_last_order') || '{}');
    if (order.orderId) {
      document.getElementById('confirm-order-id').textContent = '#' + order.orderId;
      document.getElementById('confirm-items').innerHTML =
        (order.cart || []).map(item => `
          <div style="display:flex;align-items:center;gap:.8rem;padding:.7rem 0;border-bottom:1px solid var(--border);">
            <img src="${item.img}" style="width:52px;height:52px;border-radius:8px;object-fit:cover;" alt=""/>
            <div style="flex:1"><div style="font-weight:700;">${item.name}</div>
            <div style="font-size:.78rem;color:var(--muted);">Qty: ${item.qty} | Size: ${item.size}</div></div>
            <span style="font-weight:700;">₹${item.price * item.qty}</span>
          </div>`).join('') +
        `<div class="mt-2 font-weight-bold d-flex justify-content-between" style="font-size:.95rem;">
           <span>Total Paid</span><span style="color:var(--gold);">₹${order.total}</span>
         </div>`;
    }
  } catch(e) {}
</script>
</body>
</html>

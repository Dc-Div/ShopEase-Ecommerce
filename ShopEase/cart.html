<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase – Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .cart-table { background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow2); }
    .cart-table table { margin:0; }
    .cart-table th { background:var(--navy); color:#fff; font-size:.8rem; letter-spacing:1px; text-transform:uppercase; font-weight:600; padding:1rem 1.2rem; }
    .cart-table td { padding:1rem 1.2rem; vertical-align:middle; border-color:var(--border); }
    .cart-item-img { width:70px; height:70px; border-radius:10px; object-fit:cover; }
    .cart-summary { background:#fff; border-radius:var(--radius); padding:1.8rem; border:1px solid var(--border); box-shadow:var(--shadow2); position:sticky; top:80px; }
    .summary-row { display:flex; justify-content:space-between; padding:.5rem 0; font-size:.9rem; border-bottom:1px solid var(--border); }
    .summary-row:last-child { border-bottom:none; font-weight:700; font-size:1.05rem; padding-top:1rem; }
    .remove-btn { background:none; border:none; color:#ccc; cursor:pointer; transition:.2s; font-size:1rem; }
    .remove-btn:hover { color:var(--red); }
    .qty-box { display:flex; align-items:center; gap:.4rem; }
    .qty-box button { width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background:#fff; font-size:.9rem; cursor:pointer; font-weight:700; }
    .qty-box button:hover { background:var(--gold); border-color:var(--gold); }
    .qty-box input { width:36px; text-align:center; border:1px solid var(--border); border-radius:6px; height:28px; font-weight:700; font-size:.85rem; }
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-hero">
  <h1>Shopping Cart</h1>
  <p>Review your selected items</p>
  <div class="breadcrumb-custom"><a href="index.html">Home</a><span class="sep">/</span>Cart</div>
</div>

<div class="container py-5">
  <div id="cart-empty" style="display:none;text-align:center;padding:4rem 0;">
    <div style="font-size:5rem;">🛒</div>
    <h4 style="margin:1rem 0 .5rem;font-weight:900;">Your cart is empty</h4>
    <p style="color:var(--muted);">Looks like you haven't added anything yet.</p>
    <a href="products.html" class="btn-gold btn mt-2">Start Shopping</a>
  </div>
  <div id="cart-content">
    <div class="row">
      <div class="col-lg-8 mb-4">
        <div class="cart-table">
          <table class="table mb-0">
            <thead>
              <tr>
                <th>Product</th>
                <th class="text-center">Size</th>
                <th class="text-center">Qty</th>
                <th class="text-right">Price</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cart-tbody"></tbody>
          </table>
        </div>
        <a href="products.html" class="btn-outline-gold btn mt-3"><i class="fas fa-arrow-left mr-1"></i>Continue Shopping</a>
      </div>
      <div class="col-lg-4">
        <div class="cart-summary">
          <h5 style="font-weight:900;margin-bottom:1.2rem;font-family:'Playfair Display',serif;">Order Summary</h5>
          <div class="summary-row"><span>Subtotal</span><span id="cart-subtotal">₹0</span></div>
          <div class="summary-row"><span>Delivery</span><span id="cart-delivery">₹49</span></div>
          <div class="summary-row"><span>Discount</span><span style="color:var(--green);" id="cart-discount">−₹0</span></div>
          <div class="summary-row"><span>Total</span><span id="cart-total">₹49</span></div>
          <a href="checkout.html" class="btn-gold btn w-100 mt-3 d-block text-center"><i class="fas fa-lock mr-1"></i>Proceed to Checkout</a>
          <div class="mt-3 text-center" style="font-size:.78rem;color:var(--muted);"><i class="fas fa-shield-alt mr-1" style="color:var(--gold);"></i>Secure 256-bit SSL Encryption</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script>
  injectNavbar('cart');
  injectFooter();

  function renderCart() {
    const cart = getCart();
    const empty = document.getElementById('cart-empty');
    const content = document.getElementById('cart-content');
    if (!cart.length) { empty.style.display = 'block'; content.style.display = 'none'; return; }
    empty.style.display = 'none'; content.style.display = 'block';
    document.getElementById('cart-tbody').innerHTML = cart.map(item => `
      <tr>
        <td><div class="d-flex align-items-center" style="gap:.8rem;">
          <img src="${item.img}" class="cart-item-img" alt=""/>
          <div><div style="font-weight:700;font-size:.9rem;">${item.name}</div>
          <div style="font-size:.78rem;color:var(--muted);">${item.category}</div></div>
        </div></td>
        <td class="text-center"><span style="font-size:.82rem;font-weight:600;">${item.size}</span></td>
        <td class="text-center">
          <div class="qty-box justify-content-center">
            <button onclick="updateQty(${item.id},'${item.size}',-1)">−</button>
            <input type="number" value="${item.qty}" min="1" readonly/>
            <button onclick="updateQty(${item.id},'${item.size}',1)">+</button>
          </div>
        </td>
        <td class="text-right" style="font-weight:700;">₹${item.price * item.qty}</td>
        <td><button class="remove-btn" onclick="removeFn(${item.id},'${item.size}')"><i class="fas fa-trash-alt"></i></button></td>
      </tr>`).join('');
    const sub = cart.reduce((a,b) => a + b.price * b.qty, 0);
    const delivery = sub >= 499 ? 0 : 49;
    const discount = Math.round(sub * 0.05);
    document.getElementById('cart-subtotal').textContent = '₹' + sub;
    document.getElementById('cart-delivery').textContent = delivery === 0 ? 'FREE' : '₹' + delivery;
    document.getElementById('cart-discount').textContent = '−₹' + discount;
    document.getElementById('cart-total').textContent = '₹' + (sub + delivery - discount);
  }
  function updateQty(id, size, d) { updateCartQty(id, size, d); renderCart(); }
  function removeFn(id, size) { removeFromCart(id, size); renderCart(); }
  renderCart();
</script>
</body>
</html>
